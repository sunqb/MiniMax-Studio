version: "3.9"

services:
  minimax-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: minimax-studio:latest
    container_name: minimax-studio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - DB_PATH=/app/data/history.db
    volumes:
      - ./data:/app/data   # SQLite 数据库持久化
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
